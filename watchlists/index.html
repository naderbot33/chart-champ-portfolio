<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watchlists</title>
    <meta
      name="description"
      content="Searchable watchlist notes with charts, support, resistance, weekly EMA trends, fundamentals, risks, and catalysts."
    >
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/styles.css?v=20260528-qqq">
    <script src="data/watchlist-data.js?v=20260529-nflx" defer></script>
    <script src="assets/app.js?v=20260528-qqq" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <nav class="site-tabs" aria-label="Site sections">
        <a class="site-tab" href="https://naderbot33.github.io/chart-champ-portfolio/">Portfolio</a>
        <a
          class="site-tab active"
          href="https://naderbot33.github.io/chart-champ-portfolio/watchlists/"
          aria-current="page"
        >
          Watchlists
        </a>
      </nav>

      <header class="app-header" aria-labelledby="page-title">
        <div class="header-copy-wrap">
          <h1 id="page-title">Watchlists</h1>
        </div>
        <aside class="status-panel" aria-label="Last updated">
          <span class="status-label">Last Updated</span>
          <strong id="last-updated">Pending</strong>
        </aside>
      </header>

      <section class="control-band" aria-label="Ticker search">
        <label class="search-field" for="ticker-search">
          <span>Search</span>
          <input
            id="ticker-search"
            type="search"
            placeholder="Ticker or company name"
            autocomplete="off"
          >
        </label>
      </section>

      <div class="workspace-grid">
        <section class="search-results" id="search-results-panel" aria-labelledby="results-heading" hidden>
          <div class="section-heading compact">
            <div>
              <p class="eyebrow">Results</p>
              <h2 id="results-heading">Matches</h2>
            </div>
            <span class="result-count" id="result-count">-- results</span>
          </div>
          <div class="result-list" id="watchlist-results"></div>
          <p class="empty-state" id="empty-state" hidden>No published ticker notes match that search.</p>
        </section>

        <section class="detail-panel" id="detail-panel" aria-labelledby="detail-heading" hidden>
          <div class="section-heading compact">
            <div>
              <p class="eyebrow" id="detail-list-name">Watchlist</p>
              <h2 id="detail-heading">Select a Ticker</h2>
            </div>
          </div>
          <div class="chart-preview" id="chart-preview" aria-label="Chart preview"></div>
          <div class="level-grid">
            <div>
              <span class="detail-label">Support Levels</span>
              <div class="level-list" id="support-list"></div>
            </div>
            <div>
              <span class="detail-label">Resistance Levels</span>
              <div class="level-list" id="resistance-list"></div>
            </div>
          </div>
          <div class="ema-grid" id="ema-grid"></div>
          <div class="analysis-stack" id="analysis-stack"></div>
        </section>
      </div>
    </main>

    <footer class="compliance-footer">
      For educational purposes only. Not financial advice.
    </footer>
  </body>
</html>
