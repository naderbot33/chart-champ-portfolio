name: Validate Static Site

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "assets/**"
      - "data/**"
      - "scripts/**"
      - "watchlists/**"
      - "index.html"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check JavaScript
        run: |
          node --check assets/app.js
          node --check data/portfolio-data.js
          node --check data/live-prices.js
          node --check scripts/update-portfolio-quotes.mjs
          node --check scripts/watchlist-csv-utils.mjs
          node --check scripts/validate-watchlist-data.mjs
          node --check scripts/build-watchlist-data.mjs
          node --check watchlists/assets/app.js
          node --check watchlists/data/watchlist-data.js
      - name: Validate watchlist tracker
        run: node scripts/validate-watchlist-data.mjs
