name: Update Portfolio Quotes

on:
  workflow_dispatch:
  schedule:
    # Weekdays, roughly 6:00 AM-3:45 PM Pacific during daylight time.
    # Covers pre-market, regular session, and a post-close refresh window.
    - cron: "*/15 13-22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: portfolio-quote-snapshot
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update-portfolio-quotes.mjs
      - name: Commit quote snapshot
        run: |
          if git diff --quiet -- data/live-prices.js data/live-prices.json; then
            echo "No quote changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live-prices.js data/live-prices.json
          git commit -m "Update portfolio quote snapshot"
          git push
